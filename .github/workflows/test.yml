name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: make go-test

  swift-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - run: make swift-test
