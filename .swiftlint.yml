# .swiftlint.yml

# 분석 대상 포함 경로
included:
  - swift/Sources
  - swift/Tests

# 제외 경로
excluded:
  - .build
  - Pods

# 기본 활성화된 규칙 중 비활성화할 것들
disabled_rules:
  - trailing_whitespace # SwiftFormat이 담당
  - opening_brace # SwiftFormat이 담당
  - colon # SwiftFormat이 담당
  - comma # SwiftFormat이 담당
  - sorted_imports # SwiftFormat의 sortImports가 담당 (testable-bottom 정책과 충돌)

# 기본 비활성화된 규칙 중 활성화할 것들 (opt-in)
opt_in_rules:
  - force_unwrapping # ! 강제 언래핑 금지
  - force_cast # as! 강제 캐스팅 경고
  - fatal_error_message # fatalError 메시지 필수
  - empty_count # .count == 0 대신 .isEmpty
  - closure_spacing # 클로저 공백
  - contains_over_filter_count # .filter{}.count 대신 .contains
  - first_where # .filter{}.first 대신 .first(where:)
  - unneeded_parentheses_in_closure_argument

# 규칙별 세부 설정
line_length:
  warning: 120
  error: 200
  ignores_urls: true
  ignores_comments: true

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 50
  error: 80

type_body_length:
  warning: 300
  error: 500

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - db
    - i
    - j
    - k

# 커스텀 규칙 예시
custom_rules:
  no_print:
    name: "No Print"
    regex: '(^|\s)print\s*\('
    message: "Use a logger instead of print()."
    severity: warning
